# Temporary HTTP-only config — used only for initial certificate provisioning.
# After running init-ssl.sh, nginx switches to the full default.conf with HTTPS.

server {
    listen 80;
    server_name maytokyo.com www.maytokyo.com app.maytokyo.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Waiting for SSL setup...';
        add_header Content-Type text/plain;
    }
}
