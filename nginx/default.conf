upstream frontend_upstream {
    server frontend:3000;
}

upstream backend_upstream {
    server backend:5050;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Use Docker's internal DNS so nginx doesn't crash when may-in-tokyo is down
resolver 127.0.0.11 valid=30s;

# ── Redirect HTTP → HTTPS ────────────────────────────────────────────
server {
    listen 80;
    server_name maytokyo.com www.maytokyo.com app.maytokyo.com;

    # Let Certbot verify domain ownership
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main site: maytokyo.com → May-in-Tokyo app ───────────────────────
server {
    listen 443 ssl;
    server_name maytokyo.com www.maytokyo.com;

    ssl_certificate     /etc/letsencrypt/live/maytokyo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maytokyo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 105m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Resolve at request time, not startup
    set $mayintokyo http://may-in-tokyo-app:3000;

    location /_next/static/ {
        proxy_pass $mayintokyo;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /api/ {
        proxy_pass $mayintokyo;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass $mayintokyo;
        proxy_read_timeout 60s;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── Subdomain: app.maytokyo.com → Subscription Management System ────
server {
    listen 443 ssl;
    server_name app.maytokyo.com;

    ssl_certificate     /etc/letsencrypt/live/maytokyo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maytokyo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 100m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_read_timeout 300s;
    }

    location /_next/static/ {
        proxy_pass http://frontend_upstream;
        proxy_cache_bypass $http_upgrade;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_read_timeout 300s;
        proxy_cache_bypass $http_upgrade;
    }
}